# AllWage Clock-In Service Configuration
spring.application.name=clockin-service

# Server configuration
server.port=8080

# Logging
logging.level.com.allwage=DEBUG

# Actuator — management port isolated from the public API port
# Only the health endpoint is exposed; no details leak to unauthenticated callers.
management.server.port=8081
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Geofence validation (override: APP_GEOFENCE_DEFAULT_TOLERANCE_METERS / APP_GEOFENCE_STRICT_MODE_TOLERANCE_METERS)
app.geofence.default-tolerance-meters=20
app.geofence.strict-mode-tolerance-meters=5

# SSE streaming (override: APP_SSE_EMITTER_TIMEOUT_MS)
app.sse.emitter-timeout-ms=0

# WhatsApp notifications (override: APP_NOTIFICATIONS_ENABLED)
app.notifications.enabled=true

# Seed data (override: APP_SEED_DATA_ENABLED)
app.seed-data.enabled=true

# Daily summary — future feature (override: APP_SUMMARY_ENABLED)
app.summary.enabled=false
app.summary.morning-cron=0 0 6 * * MON-FRI
app.summary.evening-cron=0 0 18 * * MON-FRI
