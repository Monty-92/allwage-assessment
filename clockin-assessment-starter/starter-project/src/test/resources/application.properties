# Test application properties — override defaults for the test environment.
# Redis is not available in CI; exclude autoconfiguration to prevent connection errors.
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# Ensure redis-based SSE fan-out is disabled in tests (default, but be explicit)
app.sse.redis-enabled=false
app.sse.redis-channel=clock-events
app.sse.emitter-timeout-ms=0

# Carry forward properties that exist in main application.properties
# (test application.properties shadows the main file — must duplicate values used by Spring context)
app.geofence.default-tolerance-meters=20
app.geofence.strict-mode-tolerance-meters=5
app.notifications.enabled=true
app.seed-data.enabled=false
app.summary.enabled=false
app.summary.morning-cron=0 0 6 * * MON-FRI
app.summary.evening-cron=0 0 18 * * MON-FRI
